<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン/登録</title>
    <style>
        :root { --bg-color: #1a1a1a; --text-color: #ffffff; --accent-color: #ff4757; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #2f3542; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-bottom: 24px; font-size: 24px; color: var(--text-color); }
        .input-group { margin-bottom: 16px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #a4b0be; }
        input { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #57606f; color: #fff; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: var(--accent-color); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; margin-top: 12px; }
        button:hover { opacity: 0.9; }
        .toggle-link { color: #1e90ff; margin-top: 15px; display: inline-block; cursor: pointer; font-size: 14px; text-decoration: underline; }
        #error-message { color: #ff6b6b; margin-top: 12px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="login-container">
    <h1 id="form-title">タイマー管理 ログイン</h1>
    
    <form id="auth-form">
        <div class="input-group">
            <label>メールアドレス</label>
            <input type="email" id="email" required autocomplete="username">
        </div>
        <div class="input-group">
            <label>パスワード (6文字以上)</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" id="submit-btn">ログイン</button>
    </form>
    
    <div class="toggle-link" id="toggle-auth">新規アカウント作成はこちら</div>
    <div id="error-message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBi4uh-EZ3d_WzuJDB26g70JqX5V4ww5_8",
  authDomain: "pomodorotimersite.firebaseapp.com",
  projectId: "pomodorotimersite",
  storageBucket: "pomodorotimersite.firebasestorage.app",
  messagingSenderId: "33972359215",
  appId: "1:33972359215:web:9c00e72c984329e62ab6da",
  measurementId: "G-8QLPFE8R9C"
};


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLoginMode = true; // モード切り替えフラグ

    // 画面切り替えイベント
    const toggleLink = document.getElementById('toggle-auth');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const errMsg = document.getElementById('error-message');

    toggleLink.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        errMsg.innerText = "";
        if (isLoginMode) {
            formTitle.innerText = "タイマー管理 ログイン";
            submitBtn.innerText = "ログイン";
            toggleLink.innerText = "新規アカウント作成はこちら";
        } else {
            formTitle.innerText = "新規アカウント登録";
            submitBtn.innerText = "新しくアカウントを作る";
            toggleLink.innerText = "すでに登録済みの場合はログイン";
        }
    });

    // 処理実行
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errMsg.innerText = "処理中...";

        try {
            if (isLoginMode) {
                // 既存のログイン処理
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                // 新規ユーザー登録処理
                await createUserWithEmailAndPassword(auth, email, password);
                alert("アカウント登録が完了しました！管理画面へ移動します。");
            }
            window.location.replace('admin.html');
        } catch (error) {
            console.error(error);
            if (error.code === 'auth/email-already-in-use') {
                errMsg.innerText = "このメールアドレスは既に登録されています。";
            } else if (error.code === 'auth/weak-password') {
                errMsg.innerText = "パスワードは6文字以上で入力してください。";
            } else if (error.code === 'auth/invalid-credential') {
                errMsg.innerText = "メールアドレスまたはパスワードが間違っています。";
            } else {
                errMsg.innerText = `エラー: ${error.message}`;
            }
        }
    });
</script>
</body>
</html>
